name: Run Python Script at 03:15 PM IST

on:
  schedule:
    - cron: "45 9 * * *"   # 03:15 PM IST daily
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run script
        run: python script.py
